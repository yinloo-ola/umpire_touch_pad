name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: umpire-touch-pad
  REGION: europe-west1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth to Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/umpire-touch-pad/server:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/umpire-touch-pad/server:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: >-
            TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }},
            TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }},
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }},
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }},
            UMPIRE_USERNAME=${{ secrets.UMPIRE_USERNAME }},
            UMPIRE_PASSWORD=${{ secrets.UMPIRE_PASSWORD }}
